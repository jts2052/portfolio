# Rendered into /etc/nginx/sites-available/portfolio by deploy/install.sh.
# __DOMAIN__ is replaced with the configured subdomain.
#
# Cloudflare Tunnel terminates TLS; this vhost listens on plain HTTP.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    root /opt/portfolio/dist;
    index index.html;

    # Real client IP comes through the cloudflared -> nginx hop in X-Forwarded-For.
    # uvicorn is started with --proxy-headers so it picks this up for rate limiting.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Vite emits hashed filenames under /assets — safe to cache aggressively.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
